<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Error</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        /* Background overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Popup box */
        .popup {
            background: white;
            padding: 30px;
            width: 400px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        .popup h2 {
            color: red;
        }

        .popup button {
            margin-top: 20px;
            padding: 8px 15px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .popup button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="overlay">
    <div class="popup">
        <h2>Error Occurred!</h2>
        <p th:text="${errorMessage}">Something went wrong.</p>
        <button onclick="window.history.back()">Go Back</button>
    </div>
</div>

</body>
</html>
